<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tarea_semana_5 - Lista de tareas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Tarea_semana_5 — Lista de tareas</h1>

    <form id="task-form" aria-label="Agregar tarea">
      <input id="task-input" type="text" placeholder="Escribe una tarea..." aria-label="Nueva tarea" />
      <button id="add-btn" type="submit">Agregar</button>
    </form>

    <p id="error-msg" class="error" role="alert" aria-live="assertive"></p>

    <section>
      <h2>Mis tareas</h2>
      <ul id="task-list" class="task-list"></ul>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
